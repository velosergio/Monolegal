services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    expose:
      - "5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    expose:
      - "5000"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://root:example_dev_password@mongo:27017/monolegal_dev?authSource=admin}
      LOG_LEVEL: ${LOG_LEVEL:-Information}
      # Email: proveedor activo y credenciales (Resend / SMTP). Secretas: solo por entorno.
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      Email__Resend__ApiKey: ${Email__Resend__ApiKey:-}
      Email__Resend__FromDomain: ${Email__Resend__FromDomain:-}
      Email__Host: ${Email__Host:-}
      Email__Port: ${Email__Port:-587}
      Email__Username: ${Email__Username:-}
      Email__Password: ${Email__Password:-}
      Email__UseStartTls: ${Email__UseStartTls:-true}
      Email__From: ${Email__From:-no-reply@monolegal.local}
      Email__FromName: ${Email__FromName:-Monolegal}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      MONGODB_URI: ${MONGODB_URI:-mongodb://root:example_dev_password@mongo:27017/monolegal_dev?authSource=admin}
      LOG_LEVEL: ${LOG_LEVEL:-Information}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      # Email: credenciales necesarias para que el worker envíe correos. Secretas: solo por entorno.
      Email__Resend__ApiKey: ${Email__Resend__ApiKey:-}
      Email__Resend__FromDomain: ${Email__Resend__FromDomain:-}
      Email__Host: ${Email__Host:-}
      Email__Port: ${Email__Port:-587}
      Email__Username: ${Email__Username:-}
      Email__Password: ${Email__Password:-}
      Email__UseStartTls: ${Email__UseStartTls:-true}
      Email__From: ${Email__From:-no-reply@monolegal.local}
      Email__FromName: ${Email__FromName:-Monolegal}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:8
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-monolegal_dev}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  mongo_config:
