name: Backend

on:
  push:
    paths:
      - "backend/**"
      - "packages/**"
      - "global.json"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "packages/**"
      - "global.json"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: Tests (dotnet test)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example_dev_password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"
        working-directory: backend
        env:
          MONGODB_URI: mongodb://root:example_dev_password@localhost:27017/monolegal_dev?authSource=admin
