version: '3.8'

services:
  # Frontend: React SPA con Vite (puerto 5173)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monolegal-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - monolegal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend: ASP.NET Core Minimal API (puerto 5000)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: monolegal-backend
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      MONGODB_URI: mongodb://root:example_dev_password@mongo:27017/monolegal_dev
      LOG_LEVEL: Debug
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - monolegal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./backend:/app/backend:ro

  # Worker: ASP.NET Core Hosted Service (sin puerto externo)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: monolegal-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MONGODB_URI: mongodb://root:example_dev_password@mongo:27017/monolegal_dev
      LOG_LEVEL: Debug
      EMAIL_PROVIDER: console  # Development: solo log
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - monolegal-network
    restart: unless-stopped
    volumes:
      - ./worker:/app/worker:ro

  # MongoDB: Base de datos (puerto 27017)
  mongo:
    image: mongo:8
    container_name: monolegal-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example_dev_password
      MONGO_INITDB_DATABASE: monolegal_dev
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - monolegal-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    command: --wantMajorityReadConcern

volumes:
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mongo
  
  mongo_config:
    driver: local

networks:
  monolegal-network:
    driver: bridge
